<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ExamVerse AI v3.0</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

.header{
  padding:15px;
  text-align:center;
  background:#1e293b;
  font-size:20px;
  font-weight:bold;
}

.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:15px;
}

.card{
  background:#1e293b;
  padding:20px;
  border-radius:12px;
  text-align:center;
}

.chatBox{
  height:60vh;
  overflow-y:auto;
  padding:10px;
  background:#0f172a;
  border-top:1px solid #334155;
}

.inputBar{
  display:flex;
  padding:10px;
  background:#1e293b;
}

input{
  flex:1;
  padding:10px;
  border:none;
  border-radius:8px;
}

button{
  margin-left:5px;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#2563eb;
  color:white;
}
</style>

</head>

<body>

<div class="header">
  ExamVerse AI 🚀
</div>

<div class="grid">
  <div class="card">🤖 AI Tutor</div>
  <div class="card">📝 Mock Tests</div>
  <div class="card">📄 OCR</div>
  <div class="card">🎤 Voice AI</div>
</div>

<div class="chatBox" id="chatBox"></div>

<div class="inputBar">
  <input id="userMsg" placeholder="Ask anything...">
  <button onclick="sendMessage()">Send</button>
</div>

<script>
function sendMessage(){

  let input = document.getElementById("userMsg");
  let msg = input.value;
  let box = document.getElementById("chatBox");

  if(msg.trim() === "") return;

  let userDiv = document.createElement("div");
  userDiv.style.textAlign = "right";
  userDiv.style.margin = "5px";
  userDiv.innerHTML = `<span style="background:#2563eb;padding:8px;border-radius:8px;">${msg}</span>`;

  box.appendChild(userDiv);

  input.value = "";

  box.scrollTop = box.scrollHeight;
}
</script>

</body>
</html>
